name: Content error or typo
description: Report a factual mistake, broken link, outdated information, or typo in the docs.
labels: ["content"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the docs! Please fill in the details below.

  - type: input
    id: page
    attributes:
      label: Page URL or path
      description: "e.g. https://docs.ferrolabs.ai/guides/providers or docs/guides/providers.mdx"
      placeholder: "https://docs.ferrolabs.ai/..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What is wrong?
      description: Describe the issue clearly. For typos, quote the wrong text.
      placeholder: "The code example on line X uses the wrong flag..."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix (optional)
      description: If you know the correct content, paste it here.
    validations:
      required: false
